steps:
  # Run unit tests in Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --target=test
      - -t=crypto-bot-test
      - .

  - name: "gcr.io/cloud-builders/docker"
    args: [run, --rm, crypto-bot-test]

  # Build production image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --target=production
      - -t=gcr.io/$PROJECT_ID/crypto-volatility-bot:$COMMIT_SHA
      - -t=gcr.io/$PROJECT_ID/crypto-volatility-bot:latest
      - .

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [push, gcr.io/$PROJECT_ID/crypto-volatility-bot:$COMMIT_SHA]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crypto-volatility-bot
      - --image=gcr.io/$PROJECT_ID/crypto-volatility-bot:$COMMIT_SHA
      - --region=asia-northeast3
      - --platform=managed
      - --min-instances=0
      - --max-instances=1
      - --memory=512Mi
      - --set-secrets=TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest

images:
  - gcr.io/$PROJECT_ID/crypto-volatility-bot:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/crypto-volatility-bot:latest
