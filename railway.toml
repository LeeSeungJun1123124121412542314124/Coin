[build]
# Dockerfile 빌드 사용 (루트 레벨 Dockerfile)
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
# Railway 대시보드에서 설정할 환경변수 목록
# TELEGRAM_BOT_TOKEN = "..."
# TELEGRAM_CHAT_ID = "..."
# COINGECKO_API_KEY = "..."
# FRED_API_KEY = "..."
# BYBIT_API_KEY = "..."
# BYBIT_API_SECRET = "..."
# DATABASE_PATH = "/data/crypto.db"
# PIN_CODE = "1234"
# ADMIN_KEY = "..."
# WHALE_ADDRESSES = "addr:name,addr:name,..."
