[build]
# Dockerfile 빌드 사용 (루트 레벨 Dockerfile)
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn dashboard.backend.main:create_application --factory --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/dashboard"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
# Railway 대시보드에서 설정할 환경변수 목록
# TELEGRAM_TOKEN = "..."
# TELEGRAM_CHAT_ID = "..."
# COINGECKO_API_KEY = "..."
# FRED_API_KEY = "..."
# DATABASE_PATH = "/data/crypto.db"
# PIN_CODE = "1234"
# ADMIN_KEY = "..."
